# Find this step and update the version
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # <-- CHANGE to v3
        with:
          path: ./site

  # Look for the deploy job at the bottom and update this as well
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # <-- CHANGE to v4